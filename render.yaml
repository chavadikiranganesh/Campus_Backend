services:
  - type: web
    name: campus-utility-backend
    runtime: node
    plan: free
    buildCommand: cd server && npm install
    startCommand: cd server && npm start
    envVars:
      - key: MONGODB_URI
        scope: build
        sync: false
      - key: PORT
        value: 5000
      - key: NODE_ENV
        value: production
